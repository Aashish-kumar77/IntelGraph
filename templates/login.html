<!DOCTYPE html>
<html>
<head><title>IntelGraph - Login</title></head>
<body style="background-color: #121212; color: #00ff00; font-family: monospace; text-align: center; margin-top: 10%;">
    <h2>System Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div style="margin: 10px auto; max-width: 400px; text-align: left;">
        {% for category, message in messages %}
          <p style="color: {% if category == 'success' %}#00ff00{% else %}#ff3333{% endif %}; border: 1px solid {% if category == 'success' %}#00ff00{% else %}#ff3333{% endif %}; padding: 10px; background: #222;">
              [{{ category|upper }}] {{ message | safe }}
          </p>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" placeholder="Username" required style="padding: 10px; margin: 10px; background: #222; color: #00ff00; border: 1px solid #00ff00;"><br>
        <input type="password" name="password" placeholder="Password" required style="padding: 10px; margin: 10px; background: #222; color: #00ff00; border: 1px solid #00ff00;"><br>
        <button type="submit" style="padding: 10px 20px; background-color: #00ff00; color: #121212; border: none; cursor: pointer; font-weight: bold;">Access System</button>
    </form>
    <br><a href="{{ url_for('register') }}" style="color: #00ff00;">Need an account? Register here.</a>
</body>
</html>
