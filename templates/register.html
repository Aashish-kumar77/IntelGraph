<!DOCTYPE html>
<html>
<head><title>IntelGraph - Register</title></head>
<body style="background-color: #121212; color: #00ff00; font-family: monospace; text-align: center; margin-top: 10%;">
    <h2>Create Investigator Profile</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div style="margin: 10px auto; max-width: 400px; text-align: left;">
        {% for category, message in messages %}
          <p style="color: #ff3333; border: 1px solid #ff3333; padding: 10px; background: #222;">
              [ERROR] {{ message }}
          </p>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" placeholder="Username" required style="padding: 10px; margin: 10px;"><br>
        <input type="password" name="password" placeholder="Password" required style="padding: 10px; margin: 10px;"><br>
        <button type="submit" style="padding: 10px 20px; background-color: #00ff00; border: none; cursor: pointer; font-weight: bold;">Register</button>
    </form>
    <br><a href="{{ url_for('login') }}" style="color: #00ff00;">Already have an account? Login here.</a>
</body>
</html>
